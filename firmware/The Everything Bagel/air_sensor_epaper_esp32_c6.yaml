esphome:
  name: "air-quality-display"
  platformio_options:
    board_build.f_cpu: 80000000L
  includes:
    - aqi_algo.h
    - display_renderer.h
  
  #Switch over to the external antenna on boot
  on_boot:
      priority: 800
      then:
        - wifi.disable:
        - output.turn_off: pin3 # activate RF Switch control
        - delay: 100ms
        - switch.turn_on: pin14 
        - wifi.enable:
        - script.execute: calculate_aqi

#Required for external antenna
output:
    platform: gpio
    id: pin3
    pin: GPIO03

# Confirm in HA that the external antenna is in use
switch:
    platform: gpio
    pin: GPIO14
    restore_mode: ALWAYS_OFF 
    name: "External Wifi Antenna"
    id: pin14

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

# This key can be generated in ESPHome Builder, or removed
api:
  encryption:
    key: "yourEncryptionKey"

ota:
  - platform: esphome
    password: "yourEspHomePassword"

wifi:
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Air Sensor Fallback"
    password: "password"

captive_portal:

logger:

i2c:
  sda: GPIO22 
  scl: GPIO23
  scan: true

spi:
  clk_pin: GPIO19
  mosi_pin: GPIO18

# 1. Define Fonts (Upload .ttf files to config folder)
font:
  - file: "gfonts://Material+Symbols+Outlined"
    id: thermometer
    size: 20
    glyphs: ["\U0000e1ff"]
  
  - file: "gfonts://Material+Symbols+Outlined"
    id: droplet
    size: 20
    glyphs: ["\U0000f87e"]

  - file: 'gfonts://Montserrat'
    id: montserrat_14
    size: 14
    glyphs: "!\/%()+&@=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖ abcdefghijklmnopqrstuvwxyzåäö"

  - file: 'gfonts://Montserrat'
    id: montserrat_20
    size: 20
    glyphs: "!\/%()+&=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖ abcdefghijklmnopqrstuvwxyzåäö"
    
  - file: 'gfonts://Montserrat'
    id: montserrat_24
    size: 24
    glyphs: "!\/%()+&=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖ abcdefghijklmnopqrstuvwxyzåäö"

image:
  defaults:
    type: binary
    resize: 100x100
  images:
    - file: "open_window.png"
      id: img_window_open
    - file: "purifier.png"
      id: img_purifier
      resize: 90x90
    - file: "ok.png"
      id: img_ok
    


time:
  - platform: homeassistant
    id: HA_time

sensor:
  - platform: homeassistant
    id: ha_outdoor_pm25
    entity_id: sensor.outdoor_pm25
  - platform: homeassistant
    id: ha_outdoor_co2
    entity_id: sensor.outdoor_co2

  - platform: sen6x
    type: SEN66
    update_interval: 30s
    
    temperature:
      name: Temperature
      id: sen66_temp
      accuracy_decimals: 1
    humidity:
      name: Humidity
      id: sen66_humidity
    voc:
      name: VOC Index
      id: sen66_voc
    nox:
      name: NOx Index
      id: sen66_nox
    co2:
      name: Carbon Dioxide
      id: sen66_co2
    pm_1_0:
      name: PM <1µm Weight concentration
      id: sen66_pm10
    pm_2_5:
      name: PM <2.5µm Weight concentration
      id: sen66_pm25
    pm_4_0:
      name: PM <4µm Weight concentration
      id: sen66_pm40
    pm_10_0:
      name: PM <10µm Weight concentration
      id: sen66_pm100
      on_value:
        then:
          - script.execute: calculate_aqi

text_sensor:
  - platform: template
    id: aqi_status
    name: "AQI Overall Status"
    icon: "mdi:air-filter"

  - platform: template
    id: aqi_action
    name: "AQI Recommended Action"
    icon: "mdi:information-outline"

  - platform: template
    id: aqi_reason
    name: "AQI Action Reason"
    icon: "mdi:text-box-search-outline"

script:
  - id: calculate_aqi
    then:
      - lambda: |-
          // 1. Fetch live sensor data (fallback to NAN if sensor fails/is booting)
          float co2 = id(sen66_co2).has_state() ? id(sen66_co2).state : NAN;
          float pm2 = id(sen66_pm25).has_state() ? id(sen66_pm25).state : NAN;
          float voc = id(sen66_voc).has_state() ? id(sen66_voc).state : NAN;
          float hum = id(sen66_humidity).has_state() ? id(sen66_humidity).state : NAN;
          
          // 2. Fetch outdoor sensor data from HA (fallback to NAN if disconnected)
          float ext_co2 = id(ha_outdoor_co2).has_state() ? id(ha_outdoor_co2).state : NAN;
          float ext_pm2 = id(ha_outdoor_pm25).has_state() ? id(ha_outdoor_pm25).state : NAN;

          // 3. Process the data
          AQIAdvice advice = AQIAlgo::get_advice(co2, pm2, voc, hum, ext_co2, ext_pm2);

          // 4. Publish to our text sensors
          id(aqi_status).publish_state(advice.status);
          id(aqi_action).publish_state(advice.action);
          id(aqi_reason).publish_state(advice.reason);
          
      # 5. Tell the display to draw the new values
      - component.update: internal_display

interval:
  - interval: 15s
    then:
      - display.page.show_next: internal_display
      - component.update: internal_display  

display:
  - platform: waveshare_epaper
    id: internal_display
    model: 2.13inv3
    cs_pin: GPIO1
    dc_pin: GPIO21
    busy_pin: GPIO17
    reset_pin: GPIO0
    update_interval: never
    auto_clear_enabled: true
    rotation: 180
    pages:
      - id: main_page
        lambda: |-
          esphome::image::Image* current_icon = AQIAlgo::get_icon_from_action(
              id(aqi_action).state,
              id(img_window_open),
              id(img_purifier),
              id(img_ok)
          );  

          draw_main_screen(
              it,
              current_icon,
              id(HA_time).now(),
              id(aqi_status).state,
              id(aqi_action).state,
              id(aqi_reason).state,
              id(sen66_temp).state,
              id(sen66_humidity).state,
              id(sen66_pm100).state,
              id(sen66_co2).state,
              id(sen66_voc).state
          );
      - id: detail_page
        lambda: |-
          draw_detail_screen(
              it,
              id(HA_time).now(),
              id(sen66_temp).state,
              id(sen66_humidity).state,
              id(sen66_pm10).state,
              id(sen66_pm25).state,
              id(sen66_pm40).state,
              id(sen66_pm100).state,
              id(sen66_co2).state,
              id(sen66_voc).state,
              id(sen66_nox).state
          );

